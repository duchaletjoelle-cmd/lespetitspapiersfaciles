name: Déploiement sur IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PORT: 4173
  BASE_PATH: /

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build public site only
        run: pnpm --filter @workspace/home run build

      - name: Deploy to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SFTP_SERVER }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          local_path: ./artifacts/home/dist/public/*
          remote_path: /test-fichier-restaurer/
          sftp_only: true
          delete_remote_files: false
          sftpArgs: -o ConnectTimeout=30
