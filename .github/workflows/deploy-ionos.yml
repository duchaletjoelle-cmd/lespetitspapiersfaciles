name: Déploiement sur IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PORT: 4173
  BASE_PATH: /

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build public site only
        run: pnpm --filter @workspace/home run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to IONOS via SFTP mirror
        env:
          IONOS_SFTP_SERVER: ${{ secrets.IONOS_SFTP_SERVER }}
          IONOS_SFTP_USERNAME: ${{ secrets.IONOS_SFTP_USERNAME }}
          IONOS_SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          lftp -u "$IONOS_SFTP_USERNAME","$IONOS_SFTP_PASSWORD" "sftp://$IONOS_SFTP_SERVER:22" <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          mirror -R --verbose ./artifacts/home/dist/public/ /public/
          bye
          EOF
