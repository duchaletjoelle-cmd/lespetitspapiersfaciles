[build]
  command = "pnpm build"
  publish = "client/dist"

[context.deploy-preview]
  # Désactive les déploiements de prévisualisation pour toutes les branches
  # sauf si explicitement activé pour une branche spécifique.
  disable = true

[context.branch-deploy]
  # Désactive les déploiements pour les branches non-production
  disable = true

[context.production]
  # Active les déploiements uniquement pour la branche de production (main)
  # Assurez-vous que votre branche principale est nommée 'main' ou 'master'
  # et ajustez si nécessaire.
  command = "pnpm build"
  publish = "client/dist"
