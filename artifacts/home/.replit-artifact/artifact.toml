kind = "web"
previewPath = "/"
title = "Home"
version = "1.0.0"
id = "artifacts/home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24319

[services.development]
run = "pnpm --filter @workspace/home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/home", "run", "build" ]
publicDir = "artifacts/home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24319"
BASE_PATH = "/"
